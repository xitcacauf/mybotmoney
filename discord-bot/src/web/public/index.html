<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Love Link — Dashboard</title>
  <style>
    :root {
      --bg:#06060f; --surface:#0e0e1c; --surface2:#161628; --surface3:#1d1d35;
      --border:#252542; --border2:#30305a;
      --text:#eeeeff; --muted:#8888aa; --muted2:#6666888;
      --pink:#e91e8c; --pink2:#ff4db8; --purple:#8b2aff; --purple2:#a855f7;
      --green:#00d4aa; --gold:#ffd000; --red:#ff4757; --blue:#2ed9ff;
      --gradient:linear-gradient(135deg,var(--pink),var(--purple));
      --glow-pink:rgba(233,30,140,.18); --glow-purple:rgba(139,42,255,.18);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;}

    /* ── Scrollbar ── */
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:var(--surface);}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

    /* ── Header ── */
    .header{background:rgba(14,14,28,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;}
    .header-logo{font-size:26px;filter:drop-shadow(0 0 8px var(--pink));}
    .header-title{font-size:20px;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.3px;}
    .header-sub{font-size:12px;color:var(--muted);margin-top:1px;}
    .header-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);margin-left:auto;flex-shrink:0;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

    /* ── Container ── */
    .container{max-width:880px;margin:0 auto;padding:20px 16px 40px;}

    /* ── Search ── */
    .search-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:22px;}
    .search-card h2{font-size:15px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;}
    .input-row{display:flex;gap:10px;flex-wrap:wrap;}
    .search-input{flex:1;min-width:180px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;}
    .search-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--glow-purple);}
    .search-input::placeholder{color:var(--muted);}
    .search-btn{background:var(--gradient);border:none;border-radius:10px;padding:12px 22px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;white-space:nowrap;}
    .search-btn:hover{opacity:.88;}
    .search-btn:active{transform:scale(.97);}
    .error-msg{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.25);border-radius:10px;padding:12px;color:var(--red);margin-top:10px;font-size:14px;}

    /* ── Tabs ── */
    .tabs-wrap{overflow-x:auto;scrollbar-width:none;margin-bottom:18px;}
    .tabs-wrap::-webkit-scrollbar{display:none;}
    .tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:5px;width:max-content;min-width:100%;}
    .tab{flex:0 0 auto;padding:9px 15px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;border-radius:9px;transition:all .2s;white-space:nowrap;}
    .tab.active{background:var(--gradient);color:#fff;font-weight:700;box-shadow:0 2px 12px var(--glow-pink);}

    /* ── Cards ── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;}
    .card-glow{box-shadow:0 0 30px var(--glow-pink);}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
    @media(max-width:580px){.grid3{grid-template-columns:1fr 1fr;}}
    @media(max-width:360px){.grid2,.grid3{grid-template-columns:1fr;}}

    /* ── Stat boxes ── */
    .stat{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;}
    .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
    .stat-val{font-size:21px;font-weight:800;line-height:1;}
    .stat-sub{font-size:12px;color:var(--muted);margin-top:4px;}

    /* ── Colours ── */
    .c-pink{color:var(--pink)!important;} .c-purple{color:var(--purple2)!important;}
    .c-green{color:var(--green)!important;} .c-gold{color:var(--gold)!important;}
    .c-red{color:var(--red)!important;} .c-blue{color:var(--blue)!important;}
    .c-muted{color:var(--muted)!important;}

    /* ── Virtual card ── */
    .vcard{border-radius:20px;padding:24px;position:relative;overflow:hidden;min-height:160px;display:flex;flex-direction:column;justify-content:space-between;margin-bottom:14px;transition:transform .2s;}
    .vcard:hover{transform:translateY(-3px);}
    .vcard::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none;}
    .vcard-glow{position:absolute;bottom:-30px;left:-30px;width:180px;height:180px;border-radius:50%;filter:blur(60px);opacity:.3;pointer-events:none;}
    .vc-tier{font-size:12px;font-weight:700;opacity:.85;letter-spacing:.5px;}
    .vc-number{font-size:17px;letter-spacing:4px;font-family:'Courier New',monospace;margin:16px 0 6px;opacity:.9;}
    .vc-name{font-size:15px;font-weight:700;}
    .vc-perks{font-size:11px;opacity:.6;margin-top:3px;}

    /* ── Section title ── */
    .sec{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin:18px 0 10px;display:flex;align-items:center;gap:7px;}
    .sec:first-child{margin-top:0;}

    /* ── Progress bar ── */
    .prog-wrap{margin-top:8px;}
    .prog-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px;}
    .prog-bar{background:var(--surface3);border-radius:99px;height:8px;overflow:hidden;}
    .prog-fill{height:100%;border-radius:99px;background:var(--gradient);transition:width .5s ease;}

    /* ── Ledger ── */
    .ledger-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
    .ledger-item:last-child{border-bottom:none;}
    .ledger-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .li-earn{background:rgba(0,212,170,.1);} .li-spend{background:rgba(255,71,87,.1);}
    .li-crime{background:rgba(139,42,255,.1);} .li-daily{background:rgba(255,208,0,.1);}
    .li-work{background:rgba(46,217,255,.1);} .li-steal{background:rgba(255,71,87,.12);}
    .li-interest{background:rgba(0,212,170,.1);}
    .ledger-desc{flex:1;min-width:0;}
    .ledger-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ledger-time{font-size:11px;color:var(--muted);margin-top:2px;}
    .ledger-amount{font-size:15px;font-weight:800;white-space:nowrap;}

    /* ── Chip ── */
    .chip{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:12px;color:var(--muted);margin:2px;}

    /* ── Ranking ── */
    .rank-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
    .rank-item:last-child{border-bottom:none;}
    .rank-num{font-size:17px;font-weight:800;width:30px;text-align:center;flex-shrink:0;}
    .rank-info{flex:1;}
    .rank-name{font-size:14px;font-weight:600;}
    .rank-badge{font-size:11px;color:var(--muted);margin-top:1px;}
    .rank-total{font-size:14px;font-weight:800;}

    /* ── RPG bar ── */
    .rpg-row{display:flex;align-items:center;gap:10px;margin:6px 0;}
    .rpg-label{font-size:12px;color:var(--muted);width:115px;flex-shrink:0;}
    .rpg-bar{flex:1;background:var(--surface3);border-radius:99px;height:6px;overflow:hidden;}
    .rpg-fill{height:100%;border-radius:99px;transition:width .5s ease;}
    .rpg-val{font-size:13px;font-weight:700;width:28px;text-align:right;flex-shrink:0;}

    /* ── Psych ── */
    .psych-row{margin:10px 0;}
    .psych-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}

    /* ── Dark love ── */
    .dl-badge{display:inline-flex;align-items:center;gap:6px;border-radius:8px;padding:5px 13px;font-size:13px;font-weight:600;}
    .dl-none{background:rgba(136,136,153,.1);color:var(--muted);}
    .dl-dom{background:rgba(255,71,87,.08);color:var(--red);border:1px solid rgba(255,71,87,.25);}
    .dl-sub{background:rgba(139,42,255,.08);color:var(--purple2);border:1px solid rgba(139,42,255,.25);}

    /* ── Pet ── */
    .pet-card{text-align:center;padding:26px 18px;}
    .pet-emoji{font-size:52px;display:block;margin-bottom:14px;filter:drop-shadow(0 0 12px var(--pink));}

    /* ── Rel badge ── */
    .rel-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(233,30,140,.08);border:1px solid rgba(233,30,140,.2);border-radius:8px;padding:4px 11px;font-size:12px;color:var(--pink);}

    /* ── Invest card ── */
    .inv-card{background:linear-gradient(135deg,#0a0020,#14003a);border:1px solid rgba(139,42,255,.3);border-radius:16px;padding:22px;margin-bottom:14px;}

    /* ── Loading ── */
    .loading{text-align:center;padding:50px 0;color:var(--muted);font-size:14px;}
    .loading::before{content:'';display:block;width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--pink);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── Divider ── */
    hr{border:none;border-top:1px solid var(--border);margin:14px 0;}

    /* ── Badge hider ── */
    [id*="badge-container"],[class*="badge-ui"],iframe[src*="/badge"]{display:none!important;}
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">🌸</div>
  <div>
    <div class="header-title">Love Link</div>
    <div class="header-sub" id="headerSub">Dashboard do Servidor</div>
  </div>
  <div class="header-dot" title="Online"></div>
</div>

<div class="container">

  <!-- Search -->
  <div class="search-card" id="searchWrap">
    <h2>🔍 Buscar Conta</h2>
    <div class="input-row">
      <input class="search-input" id="searchId" placeholder="Cole seu User ID do Discord..."/>
      <input class="search-input" id="searchGuild" placeholder="Guild ID (opcional)" style="max-width:200px"/>
      <button class="search-btn" onclick="loadUser()">Buscar</button>
    </div>
    <div id="searchError"></div>
  </div>

  <!-- Main content -->
  <div id="mainContent" style="display:none">
    <div class="tabs-wrap">
      <div class="tabs" id="tabsBar">
        <button class="tab active"  onclick="switchTab('banco')">💳 Banco</button>
        <button class="tab"         onclick="switchTab('extrato')">📋 Extrato</button>
        <button class="tab"         onclick="switchTab('investir')">📊 Investir</button>
        <button class="tab"         onclick="switchTab('perfil')">👤 Perfil</button>
        <button class="tab"         onclick="switchTab('social')">❤️ Social</button>
        <button class="tab"         onclick="switchTab('psicologia')">🧠 Psicologia</button>
        <button class="tab"         onclick="switchTab('darklove')">🖤 Dark Love</button>
        <button class="tab"         onclick="switchTab('vida')">🏡 Vida</button>
      </div>
    </div>
    <div id="tabBanco"></div>
    <div id="tabExtrato"    style="display:none"></div>
    <div id="tabInvestir"   style="display:none"></div>
    <div id="tabPerfil"     style="display:none"></div>
    <div id="tabSocial"     style="display:none"></div>
    <div id="tabPsicologia" style="display:none"></div>
    <div id="tabDarklove"   style="display:none"></div>
    <div id="tabVida"       style="display:none"></div>
  </div>

  <!-- Ranking global -->
  <div id="rankSection">
    <div class="sec">🏆 Ranking Global</div>
    <div class="card" id="rankList"><div class="loading"></div></div>
  </div>

</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const CARD_TIERS = [
  { name:"Black Elite", min:100000, color:"#10101e", glow:"#c9a000", icon:"⚫", perks:"Juros 3%/dia • Crime +15% • Loja -10%" },
  { name:"Dominador",   min:50000,  color:"#0d0030", glow:"#9b59b6", icon:"💜", perks:"Juros 2.5%/dia • Crime +10% • Transfer VIP" },
  { name:"Luxúria",     min:25000,  color:"#1a0000", glow:"#e74c3c", icon:"🔴", perks:"Juros 2%/dia • Presente bônus duplo" },
  { name:"Neon",        min:10000,  color:"#080020", glow:"#a855f7", icon:"🟣", perks:"Juros 2%/dia • XP +10%" },
  { name:"Standard",    min:0,      color:"#00100a", glow:"#27ae60", icon:"🟢", perks:"Juros 2%/dia • Acesso básico" },
];
const TYPE_ICONS = {
  earn:"💚", spend:"🔴", transfer_in:"💙", transfer_out:"🟠", interest:"📈",
  crime:"🔫", daily:"🎁", work:"💼", gift:"🎀", steal:"🦹", pix:"💸",
};
const TYPE_CLS = {
  earn:"li-earn", spend:"li-spend", interest:"li-interest", crime:"li-crime",
  daily:"li-daily", work:"li-work", gift:"li-earn", steal:"li-steal",
  transfer_in:"li-earn", transfer_out:"li-spend", pix:"li-spend",
};
const TABS = ["banco","extrato","investir","perfil","social","psicologia","darklove","vida"];

let currentUser = null;
let currentTab  = "banco";

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = n => (n||0).toLocaleString("pt-BR");
const fmtM = n => fmt(n) + " 💰";
function fmtDate(iso) {
  if (!iso) return "—";
  const d=new Date(iso), now=new Date(), diff=Math.floor((now-d)/1000);
  if (diff<60)    return "agora mesmo";
  if (diff<3600)  return Math.floor(diff/60)+"m atrás";
  if (diff<86400) return Math.floor(diff/3600)+"h atrás";
  if (diff<604800)return Math.floor(diff/86400)+"d atrás";
  return d.toLocaleDateString("pt-BR");
}
function getCard(total){ return CARD_TIERS.find(c=>total>=c.min)||CARD_TIERS[CARD_TIERS.length-1]; }
function progBar(pct,color){
  return `<div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,pct)}%;${color?`background:${color}`:''}"></div></div>`;
}
function rpgBar(val,max,color){
  return `<div class="rpg-bar"><div class="rpg-fill" style="width:${Math.min(100,val/max*100)}%;background:${color}"></div></div>`;
}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

// ── Load user ────────────────────────────────────────────────────────────────
async function loadUser(){
  const userId  = document.getElementById("searchId").value.trim();
  const guildId = document.getElementById("searchGuild").value.trim();
  const errEl   = document.getElementById("searchError");
  errEl.innerHTML = "";
  if (!userId){ errEl.innerHTML = `<div class="error-msg">⚠️ Informe o User ID do Discord</div>`; return; }
  try {
    const res = await fetch(`/api/user/${userId}${guildId?"?g="+guildId:""}`);
    if (!res.ok){ errEl.innerHTML=`<div class="error-msg">❌ Usuário não encontrado. Verifique o ID.</div>`; return; }
    currentUser = await res.json();
    document.getElementById("rankSection").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    document.getElementById("headerSub").textContent = currentUser.username;
    switchTab(currentTab);
    loadRanking(guildId);
  } catch(e){ errEl.innerHTML=`<div class="error-msg">❌ Erro ao conectar: ${e.message}</div>`; }
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",TABS[i]===tab));
  TABS.forEach(t=>{ document.getElementById("tab"+cap(t)).style.display = t===tab?"block":"none"; });
  const renders={banco:renderBanco,extrato:renderExtrato,investir:renderInvestir,perfil:renderPerfil,social:renderSocial,psicologia:renderPsicologia,darklove:renderDarkLove,vida:renderVida};
  if (currentUser && renders[tab]) renders[tab]();
}

// ── BANCO ────────────────────────────────────────────────────────────────────
function renderBanco(){
  const u=currentUser, card=getCard(u.total), cardIdx=CARD_TIERS.indexOf(card);
  const next=cardIdx>0?CARD_TIERS[cardIdx-1]:null;
  const pct=next?Math.min(100,Math.floor(u.total/next.min*100)):100;
  document.getElementById("tabBanco").innerHTML=`
    <div class="vcard card-glow" style="background:${card.color};border:1px solid ${card.glow}30;box-shadow:0 0 40px ${card.glow}18">
      <div class="vcard-glow" style="background:${card.glow}"></div>
      <div class="vc-tier">${card.icon} ${card.name}</div>
      <div>
        <div class="vc-number">•••• •••• •••• ${u.userId.slice(-4)}</div>
        <div class="vc-name">${u.username}</div>
        <div class="vc-perks">${card.perks}</div>
      </div>
    </div>

    <div class="grid3">
      <div class="stat"><div class="stat-label">👜 Carteira</div><div class="stat-val c-green">${fmtM(u.wallet)}</div></div>
      <div class="stat"><div class="stat-label">🏦 Banco</div><div class="stat-val">${fmtM(u.bank)}</div></div>
      <div class="stat"><div class="stat-label">💎 Patrimônio</div><div class="stat-val c-gold">${fmtM(u.total)}</div></div>
    </div>
    <div class="grid3">
      <div class="stat"><div class="stat-label">📈 Rend./dia</div><div class="stat-val c-green">+${fmtM(Math.floor(u.bank*.02))}</div></div>
      <div class="stat"><div class="stat-label">🔥 Streak</div><div class="stat-val c-pink">${u.streak} dia(s)</div></div>
      <div class="stat"><div class="stat-label">💹 Acumulado</div><div class="stat-val">${fmtM(u.totalEarned)}</div></div>
    </div>

    ${next?`
    <div class="card">
      <div class="sec" style="margin-top:0">⬆️ Progresso para ${next.icon} ${next.name}</div>
      <div class="prog-wrap">
        <div class="prog-labels"><span>${fmtM(u.total)}</span><span>${fmtM(next.min)}</span></div>
        ${progBar(pct)}
        <div style="font-size:12px;color:var(--muted);margin-top:6px">Faltam <strong>${fmtM(next.min-u.total)}</strong> para o próximo tier</div>
      </div>
    </div>`:
    `<div class="card" style="text-align:center;padding:22px"><div style="font-size:32px">⚫👑</div><div style="font-weight:700;margin-top:8px">Tier Máximo!</div><div style="color:var(--muted);font-size:13px;margin-top:4px">Você chegou ao topo</div></div>`}

    <div class="sec">🏆 Ranking do Servidor</div>
    <div class="card" id="rankListInline"><div class="loading"></div></div>
  `;
  loadRankingInto("rankListInline", document.getElementById("searchGuild").value.trim());
}

// ── EXTRATO ──────────────────────────────────────────────────────────────────
function renderExtrato(){
  const ledger=(currentUser.ledger||[]);
  const items=ledger.length?ledger.map(e=>{
    const cls=TYPE_CLS[e.type]||"li-earn", icon=TYPE_ICONS[e.type]||"⚪", pos=(e.amount||0)>=0;
    return `<div class="ledger-item">
      <div class="ledger-icon ${cls}">${icon}</div>
      <div class="ledger-desc">
        <div class="ledger-name">${e.description||e.type||"Transação"}</div>
        <div class="ledger-time">${fmtDate(e.timestamp)}</div>
      </div>
      <div class="ledger-amount" style="color:${pos?"var(--green)":"var(--red)"}">${pos?"+":""}${fmtM(e.amount)}</div>
    </div>`;
  }).join(""):`<div class="loading" style="padding:30px 0">Nenhuma transação ainda</div>`;
  document.getElementById("tabExtrato").innerHTML=`
    <div class="sec">📋 Histórico de Transações</div>
    <div class="card">${items}</div>
  `;
}

// ── INVESTIR ─────────────────────────────────────────────────────────────────
function renderInvestir(){
  const inv=currentUser.activeInvestment;
  const invTypes={
    acoes:{icon:"📊",name:"Ações Fictícias",risk:"Médio"},
    crypto:{icon:"🪙",name:"Criptomoedas",risk:"Alto"},
    imovel:{icon:"🏗️",name:"Imóveis",risk:"Baixo"},
    negocio:{icon:"🏪",name:"Negócio",risk:"Médio-Alto"},
    cassino:{icon:"🎰",name:"Cassino Virtual",risk:"Extremo"},
  };
  let invHtml="";
  if(inv){
    const t=invTypes[inv.type]||{icon:"📈",name:inv.typeName||inv.type,risk:"?"};
    const ready=new Date(inv.readyAt)<=new Date();
    const profit=inv.projectedProfit||0;
    invHtml=`<div class="inv-card">
      <div style="font-size:32px;margin-bottom:10px">${t.icon}</div>
      <div style="font-size:18px;font-weight:700">${t.name}</div>
      <div class="grid2" style="margin-top:14px">

// ── Ranking ──────────────────────────────────────────────────────────────────
async function loadRankingInto(elId, guildId){
  const el=document.getElementById(elId);
  if (!el) return;
  try {
    const res=await fetch(`/api/ranking/${guildId||"global"}`);
    if (!res.ok){ el.innerHTML=`<div class="loading" style="padding:20px 0">Ranking indisponível</div>`; return; }
    const list=await res.json();
    if (!list.length){ el.innerHTML=`<div class="loading" style="padding:20px 0">Nenhum usuário ainda</div>`; return; }
    const medalColors=["var(--gold)","#aab","#cd7f32"];
    const medalIcons=["🥇","🥈","🥉"];
    el.innerHTML=list.map((u,i)=>`
      <div class="rank-item">
        <div class="rank-num" style="color:${medalColors[i]||"var(--muted)"}">${i<3?medalIcons[i]:i+1}</div>
        <div class="rank-info">
          <div class="rank-name">${u.username}</div>
          <div class="rank-badge">${u.card?.icon||""} ${u.card?.name||""} • Lv.${u.level||1}</div>
        </div>
        <div class="rank-total c-green">${fmtM(u.total)}</div>
      </div>`).join("");
  } catch(e){ el.innerHTML=`<div class="loading" style="padding:20px 0">Erro ao carregar ranking</div>`; }
}

async function loadRanking(guildId){ await loadRankingInto("rankList",guildId); }

// ── Auto-load from URL ────────────────────────────────────────────────────────
(function init(){
  const p=new URLSearchParams(window.location.search);
  const g=p.get("g")||p.get("guildId")||"";
  const parts=window.location.pathname.split("/");
  const autoId=parts[1]==="bank"&&parts[2]?parts[2]:"";
  if (autoId){
    document.getElementById("searchId").value=autoId;
    document.getElementById("searchGuild").value=g;
    document.getElementById("searchWrap").style.display="none";
    loadUser();
  }
  loadRanking(g||"");

  (function removeBadge(){
    function nuke(el){ if(el){ el.style.cssText="display:none!important;"; el.remove&&el.remove(); } }
    function sweep(){ document.querySelectorAll('[id*="badge-container"],[class*="badge-ui"],iframe[src*="/badge"]').forEach(nuke); }
    sweep();
    new MutationObserver(sweep).observe(document.documentElement,{childList:true,subtree:true});
  })();
})();
</script>

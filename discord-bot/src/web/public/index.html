<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Love Link</title>
  <style>
    :root {
      --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26; --border:#2a2a3a;
      --text:#e8e8f0; --muted:#888899; --green:#00d4aa; --red:#e74c3c;
      --purple:#9b59b6; --pink:#e91e8c; --gold:#f1c40f; --blue:#3498db;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

    /* Header */
    .header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;}
    .header-logo{font-size:22px;}
    .header-title{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .header-sub{font-size:11px;color:var(--muted);margin-top:2px;}

    /* Container */
    .container{max-width:860px;margin:0 auto;padding:16px;}

    /* Search */
    .search-wrap{margin-bottom:20px;}
    .search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s;}
    .search-input:focus{border-color:var(--purple);}
    .search-btn{margin-top:10px;width:100%;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:12px;padding:13px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;}
    .search-btn:hover{opacity:.85;}
    .error-msg{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:10px;padding:14px;color:var(--red);text-align:center;margin-top:8px;}

    /* Scrollable tabs */
    .tabs-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:18px;}
    .tabs-wrap::-webkit-scrollbar{display:none;}
    .tabs{display:flex;gap:6px;background:var(--surface2);border-radius:12px;padding:4px;width:max-content;min-width:100%;}
    .tab{flex:0 0 auto;padding:9px 14px;border:none;background:none;color:var(--muted);font-size:13px;cursor:pointer;border-radius:8px;transition:all .2s;white-space:nowrap;}
    .tab.active{background:var(--surface);color:var(--text);font-weight:600;}

    /* Cards & grid */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;}
    .card+.card,.card+.grid2,.card+.grid3,.grid2+.card,.grid3+.card{margin-top:14px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
    @media(max-width:580px){.grid2,.grid3{grid-template-columns:1fr 1fr;}}
    @media(max-width:360px){.grid2,.grid3{grid-template-columns:1fr;}}

    /* Stat boxes */
    .stat{background:var(--surface2);border-radius:10px;padding:14px;}
    .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
    .stat-val{font-size:22px;font-weight:700;}
    .stat-sub{font-size:12px;color:var(--muted);margin-top:3px;}
    .green{color:var(--green);} .red{color:var(--red);} .gold{color:var(--gold);} .purple{color:var(--purple);} .pink{color:var(--pink);}

    /* Virtual Card */
    .virtual-card{border-radius:18px;padding:22px;position:relative;overflow:hidden;min-height:160px;display:flex;flex-direction:column;justify-content:space-between;transition:transform .2s;}
    .virtual-card:hover{transform:translateY(-3px);}
    .virtual-card::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none;}
    .vc-glow{position:absolute;bottom:-30px;left:-30px;width:150px;height:150px;border-radius:50%;filter:blur(55px);opacity:.35;}
    .vc-tier{font-size:12px;font-weight:600;opacity:.8;}
    .vc-number{font-size:16px;letter-spacing:3px;font-family:monospace;margin:14px 0 6px;opacity:.9;}
    .vc-name{font-size:14px;font-weight:600;}
    .vc-perks{font-size:11px;opacity:.65;margin-top:3px;}

    /* Progress bar */
    .prog-wrap{margin-top:8px;}
    .prog-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px;}
    .prog-bar{background:var(--surface2);border-radius:99px;height:8px;overflow:hidden;}
    .prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pink),var(--purple));transition:width .4s;}

    /* Ledger */
    .ledger-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
    .ledger-item:last-child{border-bottom:none;}
    .ledger-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .ledger-icon.earn{background:rgba(0,212,170,.12);}
    .ledger-icon.spend{background:rgba(231,76,60,.12);}
    .ledger-icon.crime{background:rgba(155,89,182,.12);}
    .ledger-icon.daily{background:rgba(241,196,15,.12);}
    .ledger-icon.work{background:rgba(52,152,219,.12);}
    .ledger-desc{flex:1;min-width:0;}
    .ledger-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ledger-time{font-size:12px;color:var(--muted);margin-top:2px;}
    .ledger-amount{font-size:15px;font-weight:700;white-space:nowrap;}
    .ledger-amount.pos{color:var(--green);}
    .ledger-amount.neg{color:var(--red);}

    /* Section title */
    .sec{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 10px;display:flex;align-items:center;gap:7px;}
    .sec:first-child{margin-top:0;}

    /* Chip */
    .chip{display:inline-block;background:var(--surface2);border-radius:6px;padding:3px 9px;font-size:12px;color:var(--muted);margin:2px;}

    /* Rank */
    .rank-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
    .rank-item:last-child{border-bottom:none;}
    .rank-num{font-size:18px;font-weight:700;width:28px;text-align:center;flex-shrink:0;}
    .rank-num.gold{color:var(--gold);} .rank-num.silver{color:#aaa;} .rank-num.bronze{color:#cd7f32;}
    .rank-name{flex:1;}
    .rank-badge{font-size:11px;color:var(--muted);}
    .rank-total{font-size:14px;font-weight:700;color:var(--green);}

    /* Gauge / RPG bar */
    .rpg-row{display:flex;align-items:center;gap:10px;margin:6px 0;}
    .rpg-label{font-size:12px;color:var(--muted);width:110px;flex-shrink:0;}
    .rpg-bar{flex:1;background:var(--surface2);border-radius:99px;height:6px;overflow:hidden;}
    .rpg-fill{height:100%;border-radius:99px;}
    .rpg-val{font-size:13px;font-weight:600;width:28px;text-align:right;flex-shrink:0;}

    /* Psych gauge */
    .psych-row{margin:10px 0;}
    .psych-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}

    /* Dark love */
    .dl-role-badge{display:inline-flex;align-items:center;gap:6px;border-radius:8px;padding:5px 12px;font-size:13px;font-weight:600;}
    .dl-none{background:rgba(136,136,153,.1);color:var(--muted);}
    .dl-dom{background:rgba(231,76,60,.1);color:#e74c3c;border:1px solid rgba(231,76,60,.3);}
    .dl-sub{background:rgba(155,89,182,.1);color:var(--purple);border:1px solid rgba(155,89,182,.3);}

    /* Pet */
    .pet-card{text-align:center;padding:24px;}
    .pet-emoji{font-size:48px;display:block;margin-bottom:12px;}
    .pet-bar-wrap{margin:8px 0;}
    .pet-bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px;}

    /* Rel stage badge */
    .rel-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(233,30,140,.1);border:1px solid rgba(233,30,140,.2);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--pink);}

    /* Inv card */
    .inv-card{background:linear-gradient(135deg,#0d001a,#16004a);border:1px solid rgba(155,89,182,.3);border-radius:14px;padding:20px;}

    /* Loading */
    .loading{text-align:center;padding:50px 0;color:var(--muted);}

    /* Hide Replit badge */
    [class*="replit-ui"],[id*="replit-badge"],iframe[src*="replit"]{display:none!important;}
  </style>
</head>
<body>
<div class="header">
  <div class="header-logo">🌸</div>
  <div>
    <div class="header-title">Love Link</div>
    <div class="header-sub" id="headerSub">Painel do servidor</div>
  </div>
</div>

<div class="container">
  <div class="search-wrap" id="searchWrap">
    <input class="search-input" id="searchId" placeholder="Cole seu User ID do Discord aqui..."/>
    <input class="search-input" id="searchGuild" placeholder="Guild ID (opcional)" style="margin-top:8px"/>
    <button class="search-btn" onclick="loadUser()">🔍 Buscar Conta</button>
    <div id="searchError"></div>
  </div>

  <div id="mainContent" style="display:none">
    <div class="tabs-wrap">
      <div class="tabs" id="tabsBar">
        <button class="tab active" onclick="switchTab('banco')">💳 Banco</button>
        <button class="tab" onclick="switchTab('extrato')">📋 Extrato</button>
        <button class="tab" onclick="switchTab('investir')">📊 Investir</button>
        <button class="tab" onclick="switchTab('perfil')">👤 Perfil</button>
        <button class="tab" onclick="switchTab('social')">❤️ Social</button>
        <button class="tab" onclick="switchTab('psicologia')">🧠 Psicologia</button>
        <button class="tab" onclick="switchTab('darklove')">🖤 Dark Love</button>
        <button class="tab" onclick="switchTab('vida')">🏡 Vida Virtual</button>
      </div>
    </div>
    <div id="tabBanco"></div>
    <div id="tabExtrato" style="display:none"></div>
    <div id="tabInvestir" style="display:none"></div>
    <div id="tabPerfil" style="display:none"></div>
    <div id="tabSocial" style="display:none"></div>
    <div id="tabPsicologia" style="display:none"></div>
    <div id="tabDarklove" style="display:none"></div>
    <div id="tabVida" style="display:none"></div>
  </div>

  <div id="rankSection">
    <div class="sec">🏆 Ranking de Ricos</div>
    <div class="card" id="rankList"><div class="loading">Carregando ranking...</div></div>
  </div>
</div>

<script>
const CARD_TIERS = [
  { name:"Black Elite", min:100000, color:"#1a1a2e", glow:"#c9a000", icon:"⚫", perks:"Juros 3%/dia • Crime +15% • Loja -10%" },
  { name:"Dominador",   min:50000,  color:"#16004a", glow:"#9b59b6", icon:"💜", perks:"Juros 2.5%/dia • Crime +10% • Transfer VIP" },
  { name:"Luxúria",    min:25000,  color:"#2d0000", glow:"#e74c3c", icon:"🔴", perks:"Juros 2%/dia • Presente bônus duplo" },
  { name:"Neon",        min:10000,  color:"#0d001a", glow:"#a855f7", icon:"🟣", perks:"Juros 2%/dia • XP +10%" },
  { name:"Standard",    min:0,      color:"#001a0a", glow:"#27ae60", icon:"🟢", perks:"Juros 2%/dia • Acesso básico" },
];
const TYPE_ICONS = { earn:"💚", spend:"🔴", transfer_in:"💙", transfer_out:"🟠", interest:"📈", crime:"🔫", daily:"🎁", work:"💼", gift:"🎀", steal:"🦹", pix:"💸" };
const TYPE_CLASS = { earn:"earn", spend:"spend", interest:"earn", crime:"crime", daily:"daily", work:"work", gift:"earn", steal:"crime", transfer_in:"earn", transfer_out:"spend", pix:"spend" };

let currentUser = null;
let currentTab  = "banco";

function fmt(n){ return (n||0).toLocaleString("pt-BR"); }
function fmtMoney(n){ return fmt(n) + " 💰"; }
function fmtDate(iso){
  if (!iso) return "—";
  const d = new Date(iso), now = new Date(), diff = Math.floor((now-d)/1000);
  if (diff < 60)   return "agora mesmo";
  if (diff < 3600) return Math.floor(diff/60) + "m atrás";
  if (diff < 86400) return Math.floor(diff/3600) + "h atrás";
  if (diff < 86400*7) return Math.floor(diff/86400) + "d atrás";
  return d.toLocaleDateString("pt-BR");
}
function getCard(total){ return CARD_TIERS.find(c=>total>=c.min)||CARD_TIERS[CARD_TIERS.length-1]; }
function progBar(pct, color){ return `<div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,pct)}%;background:${color||'linear-gradient(90deg,var(--pink),var(--purple))'}"></div></div>`; }
function rpgBar(val, max, color){ return `<div class="rpg-bar"><div class="rpg-fill" style="width:${Math.min(100,val/max*100)}%;background:${color}"></div></div>`; }

async function loadUser(){
  const userId  = document.getElementById("searchId").value.trim();
  const guildId = document.getElementById("searchGuild").value.trim();
  const errEl   = document.getElementById("searchError");
  errEl.innerHTML = "";
  if (!userId){ errEl.innerHTML = `<div class="error-msg">Informe o User ID</div>`; return; }
  try {
    const url = `/api/user/${userId}${guildId ? "?g="+guildId : ""}`;
    const res = await fetch(url);
    if (!res.ok){ errEl.innerHTML = `<div class="error-msg">Usuário não encontrado.</div>`; return; }
    currentUser = await res.json();
    document.getElementById("rankSection").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    document.getElementById("headerSub").textContent = currentUser.username;
    switchTab(currentTab);
    loadRanking(guildId);
  } catch(e){ errEl.innerHTML = `<div class="error-msg">Erro: ${e.message}</div>`; }
}

const TAB_NAMES = ["banco","extrato","investir","perfil","social","psicologia","darklove","vida"];
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active", TAB_NAMES[i]===tab));
  TAB_NAMES.forEach(t=>{ document.getElementById("tab"+cap(t)).style.display = t===tab?"block":"none"; });
  const renders = { banco:renderBanco, extrato:renderExtrato, investir:renderInvestir, perfil:renderPerfil, social:renderSocial, psicologia:renderPsicologia, darklove:renderDarkLove, vida:renderVida };
  if (currentUser && renders[tab]) renders[tab]();
}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

// ── BANCO ────────────────────────────────────────────────────────────────────
function renderBanco(){
  const u = currentUser;
  const card = getCard(u.total);
  const cardIdx = CARD_TIERS.indexOf(card);
  const next = cardIdx > 0 ? CARD_TIERS[cardIdx-1] : null;
  const pct = next ? Math.min(100, Math.floor(u.total/next.min*100)) : 100;
  const projInterest = Math.floor(u.bank * 0.02);

  document.getElementById("tabBanco").innerHTML = `
    <div class="virtual-card" style="background:${card.color};border:1px solid ${card.glow}35;box-shadow:0 0 28px ${card.glow}18">
      <div class="vc-glow" style="background:${card.glow}"></div>
      <div><div class="vc-tier">${card.icon} ${card.name}</div></div>
      <div>
        <div class="vc-number">**** **** **** ${u.userId.slice(-4)}</div>
        <div class="vc-name">${u.username}</div>
        <div class="vc-perks">${card.perks}</div>
      </div>
    </div>

    <div class="grid3" style="margin-top:14px">
      <div class="stat"><div class="stat-label">👜 Carteira</div><div class="stat-val green">${fmtMoney(u.wallet)}</div></div>
      <div class="stat"><div class="stat-label">🏦 Banco</div><div class="stat-val">${fmtMoney(u.bank)}</div></div>
      <div class="stat"><div class="stat-label">💎 Patrimônio</div><div class="stat-val gold">${fmtMoney(u.total)}</div></div>
    </div>
    <div class="grid3" style="margin-top:12px">
      <div class="stat"><div class="stat-label">📈 Rend./dia</div><div class="stat-val green">+${fmtMoney(projInterest)}</div></div>
      <div class="stat"><div class="stat-label">🔥 Streak</div><div class="stat-val">${u.streak} dia(s)</div></div>
      <div class="stat"><div class="stat-label">💹 Total Acumulado</div><div class="stat-val">${fmtMoney(u.totalEarned)}</div></div>
    </div>

    ${next ? `
    <div class="card" style="margin-top:14px">
      <div class="sec" style="margin-top:0">⬆️ Progresso — ${next.icon} ${next.name}</div>
      <div class="prog-wrap">
        <div class="prog-labels"><span>${fmtMoney(u.total)}</span><span>${fmtMoney(next.min)}</span></div>
        ${progBar(pct)}
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px">Faltam <strong>${fmtMoney(next.min-u.total)}</strong> para o próximo tier</div>
    </div>` : `
    <div class="card" style="margin-top:14px;text-align:center">
      <div style="font-size:28px">⚫👑</div>
      <div style="font-weight:700;margin-top:8px">Tier Máximo!</div>
    </div>`}

    <div class="sec">🏆 Ranking</div>
    <div class="card" id="rankListInline"><div class="loading">Carregando...</div></div>
  `;
  const g = document.getElementById("searchGuild").value.trim();
  loadRankingInto("rankListInline", g);
}

// ── EXTRATO ──────────────────────────────────────────────────────────────────
function renderExtrato(){
  const u = currentUser;
  const ledger = u.ledger || [];
  const items = ledger.length ? ledger.map(e=>{
    const cls = TYPE_CLASS[e.type]||"earn";
    const icon = TYPE_ICONS[e.type]||"⚪";
    const pos = (e.amount||0) >= 0;
    return `<div class="ledger-item">
      <div class="ledger-icon ${cls}">${icon}</div>
      <div class="ledger-desc">
        <div class="ledger-name">${e.description||e.type||"Transação"}</div>
        <div class="ledger-time">${fmtDate(e.timestamp)}</div>
      </div>
      <div class="ledger-amount ${pos?"pos":"neg"}">${pos?"+":""}${fmtMoney(e.amount)}</div>
    </div>`;
  }).join("") : `<div class="loading">Nenhuma transação ainda.<br>Use !diario, !trabalhar ou !crime!</div>`;

  document.getElementById("tabExtrato").innerHTML = `
    <div class="sec">📋 Histórico de Transações</div>
    <div class="card">${items}</div>
  `;
}

// ── INVESTIR ─────────────────────────────────────────────────────────────────
function renderInvestir(){
  const u = currentUser;
  const inv = u.activeInvestment;
  const invTypes = {
    acoes:   { icon:"📊", name:"Ações Fictícias",  risk:"Médio" },
    crypto:  { icon:"🪙", name:"Criptomoedas",    risk:"Alto" },
    imovel:  { icon:"🏗️", name:"Imóveis",          risk:"Baixo" },
    negocio: { icon:"🏪", name:"Negócio",          risk:"Médio-Alto" },
    cassino: { icon:"🎰", name:"Cassino Virtual",  risk:"Extremo" },
  };
  let invHtml = "";
  if (inv){
    const t = invTypes[inv.type]||{ icon:"📈", name:inv.typeName||inv.type, risk:"?" };
    const isReady = new Date(inv.readyAt) <= new Date();
    invHtml = `<div class="inv-card">
      <div style="font-size:28px">${t.icon}</div>
      <div style="font-size:18px;font-weight:700;margin:8px 0">${t.name}</div>
      <div class="grid2" style="margin-top:12px">
        <div class="stat"><div class="stat-label">💰 Investido</div><div class="stat-val">${fmtMoney(inv.amount)}</div></div>
        <div class="stat"><div class="stat-label">📊 Projeção</div><div class="stat-val ${(inv.projectedProfit||0)>=0?"green":"red"}">${(inv.projectedProfit||0)>=0?"+":""}${fmtMoney(inv.projectedProfit)}</div></div>
      </div>
      <div style="margin-top:12px;font-size:14px">
        ${isReady ? `<span style="color:var(--green)">✅ Pronto! Use <code>!investir resgatar</code></span>` : `⏳ Retorno em: ${fmtDate(inv.readyAt)}`}
      </div>
    </div>`;
  } else {
    invHtml = `<div class="card" style="text-align:center;padding:40px">
      <div style="font-size:32px">📈</div>
      <div style="font-weight:700;margin:12px 0">Nenhum Investimento Ativo</div>
      <div style="color:var(--muted);font-size:14px">Use <code>!investir &lt;valor&gt; &lt;tipo&gt;</code> no Discord</div>
    </div>`;
  }
  document.getElementById("tabInvestir").innerHTML = `
    <div class="sec">📊 Investimento Ativo</div>
    ${invHtml}
    <div class="sec">📋 Tipos Disponíveis</div>
    <div class="card">
      ${Object.entries(invTypes).map(([k,v])=>`
        <div style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="font-weight:600">${v.icon} ${v.name} <span class="chip">${k}</span></div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">Risco: ${v.risk} • <code>!investir 5000 ${k}</code></div>
        </div>`).join("")}
    </div>
  `;
}

// ── PERFIL ────────────────────────────────────────────────────────────────────
function renderPerfil(){
  const u = currentUser;
  const p = u.profile||{};
  const archetypes = { misterioso:"🌑",dominador:"👑",carente:"💔",sedutor:"💋",protetor:"🛡️",manipulador:"🕷️",poetico:"✍️" };
  const auraColors  = { divino:"#f1c40f",venenoso:"#a855f7",magnetico:"#e91e8c",sombrio:"#1a1a2e",fogoETrevas:"#e74c3c",comum:"#666" };
  const archIcon = archetypes[p.archetype]||"🌑";
  const auraColor = auraColors[p.aura]||"#666";

  const rpg = u.rpg||{};
  const rpgStats = [
    { name:"✨ Charme",        key:"charm",        color:"#e91e8c" },
    { name:"🕷️ Manipulação",   key:"manipulation", color:"#9b59b6" },
    { name:"💋 Sedução",       key:"seduction",    color:"#e74c3c" },
    { name:"🧠 Inteligência",  key:"intelligence", color:"#3498db" },

// ── SOCIAL ───────────────────────────────────────────────────────────────────
function renderSocial(){
  const u = currentUser;
  const s = u.social||{};

  const xpNeeded = s.level ? s.level*100 : 100;

  const relLabels = { single:"🌙 Solo",dating:"❤️ Namorando",married:"💍 Casado(a)",none:"Solo" };
  const stageLabels = { namorando:"❤️ Namorando",casado:"💍 Casado(a)",none:"—",amigos:"👫 Amigos" };
  const monthNames = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

  let relHtml = "";
  if (rel.status && rel.status !== "single" && rel.status !== "none") {
    const annDate = rel.anniversary ? new Date(rel.anniversary) : null;
    const annStr = annDate ? `${annDate.getDate()} de ${monthNames[annDate.getMonth()]}` : null;
    const obsLevel = rel.obsessionLevel||0;

    relHtml = `
      <div class="card" style="margin-top:14px">

        </div>
        ${rel.partnerName?`<div style="font-size:14px;color:var(--muted);margin-bottom:12px">Com: <strong style="color:var(--text)">${rel.partnerName}</strong></div>`:""}
        ${annStr?`<div style="font-size:13px;color:var(--muted);margin-bottom:12px">💍 Aniversário: <strong>${annStr}</strong></div>`:""}
        <div class="grid2">
          <div class="stat"><div class="stat-label">💞 Obsessão</div><div class="stat-val pink">${obsLevel}</div></div>
          <div class="stat"><div class="stat-label">🔗 Bond XP</div><div class="stat-val">${fmt(bondXP)}</div></div>

          ${rel.memories.slice(0,3).map(m=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted)">${fmtDate(m.date||m.timestamp)} — ${m.description||m.content||"Memória"}</div>`).join("")}
          ${rel.memories.length>3?`<div style="font-size:12px;color:var(--muted);margin-top:6px">+${rel.memories.length-3} memória(s)</div>`:""}
        </div>` : ""}

  const u = currentUser;

    const pct = Math.min(100,Math.floor(val/max*100));
    const color = pct > 60 ? colorHigh : pct > 30 ? "#f1c40f" : colorLow;
    return `<div class="psych-row">
      <div class="psych-top"><span style="font-weight:600">${label}</span><span style="color:var(--muted)">${val}/${max}</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">${desc}</div>

  const archProfile = {

    carente:{ name:"💔 Carente", desc:"Busca atenção e afeto constantemente." },

    </div>

    <div class="card" style="margin-top:14px">
      <div class="sec" style="margin-top:0">🎲 Atributos de Influência</div>
      ${[
        { name:"✨ Charme",       val:u.rpg?.charm||10,        max:30, desc:"Capacidade de agradar e encantar", color:"#e91e8c" },
        { name:"🕷️ Manipulação",  val:u.rpg?.manipulation||5,  max:30, desc:"Habilidade de influenciar sutilmente", color:"#9b59b6" },
        { name:"💋 Sedução",      val:u.rpg?.seduction||5,     max:30, desc:"Poder de atração romântica", color:"#e74c3c" },
        { name:"🧠 Inteligência", val:u.rpg?.intelligence||10, max:30, desc:"Capacidade analítica e social", color:"#3498db" },
        { name:"👑 Dominância",   val:u.rpg?.dominance||5,     max:30, desc:"Liderança e imposição", color:"#f1c40f" },
        { name:"💔 Carência",     val:u.rpg?.carencia||5,      max:30, desc:"Nível de dependência emocional", color:"#888" },

// ── Ranking ───────────────────────────────────────────────────────────────────
async function loadRankingInto(elId, guildId){
  const el = document.getElementById(elId);
  if (!el) return;
  try {
    const res = await fetch(`/api/ranking/${guildId||"all"}`);
    if (!res.ok){ el.innerHTML=`<div class="loading">Sem dados de ranking.</div>`; return; }
    const data = await res.json();
    if (!data.length){ el.innerHTML=`<div class="loading">Nenhum usuário encontrado.</div>`; return; }
    const medals = ["gold","silver","bronze"];
    el.innerHTML = data.map((u,i)=>`
      <div class="rank-item">
        <div class="rank-num ${medals[i]||""}">${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
        <div class="rank-name">
          <div>${u.username}</div>
          <div class="rank-badge">${u.card.icon} ${u.card.name} • Nível ${u.level}</div>
        </div>
        <div class="rank-total">${fmtMoney(u.total)}</div>
      </div>`).join("");
  } catch(e){ el.innerHTML=`<div class="loading">Erro ao carregar.</div>`; }
}

async function loadRanking(guildId){
  await loadRankingInto("rankList", guildId);
}
